<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maintenance - Sedang dalam Perbaikan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Animated background */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow::before {
            content: '';
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(139, 92, 246, 0.05) 40%, transparent 70%);
            animation: pulse-bg 4s ease-in-out infinite;
        }

        .bg-glow::after {
            content: '';
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translate(-50%, 50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, transparent 60%);
            animation: pulse-bg 5s ease-in-out infinite reverse;
        }

        @keyframes pulse-bg {

            0%,
            100% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(1);
            }

            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        /* Maintenance card */
        .maintenance-card {
            position: relative;
            z-index: 1;
            background: linear-gradient(135deg, rgba(30, 20, 50, 0.9) 0%, rgba(20, 15, 35, 0.95) 100%);
            border: 1px solid rgba(139, 92, 246, 0.3);
            border-radius: 24px;
            padding: 48px 40px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow:
                0 0 40px rgba(139, 92, 246, 0.1),
                0 0 80px rgba(139, 92, 246, 0.05),
                0 20px 60px rgba(0, 0, 0, 0.5);
            animation: card-float 6s ease-in-out infinite;
        }

        .maintenance-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 25px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.4), rgba(236, 72, 153, 0.2), rgba(139, 92, 246, 0.1));
            z-index: -1;
            opacity: 0.5;
            animation: border-glow 3s ease-in-out infinite alternate;
        }

        @keyframes card-float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        @keyframes border-glow {
            0% {
                opacity: 0.3;
            }

            100% {
                opacity: 0.7;
            }
        }

        /* Gear icon */
        .gear-container {
            margin-bottom: 32px;
            position: relative;
            display: inline-block;
        }

        .gear-icon {
            font-size: 64px;
            display: inline-block;
            animation: spin-gear 4s linear infinite;
            filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.3));
        }

        .gear-wrench {
            position: absolute;
            top: -5px;
            right: -10px;
            font-size: 28px;
            animation: wrench-wobble 2s ease-in-out infinite;
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.5));
        }

        @keyframes spin-gear {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes wrench-wobble {

            0%,
            100% {
                transform: rotate(-15deg);
            }

            50% {
                transform: rotate(15deg);
            }
        }

        /* Title */
        .maintenance-title {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .construction-emoji {
            display: inline-block;
            animation: bounce-emoji 1.5s ease-in-out infinite;
        }

        .construction-emoji:last-child {
            animation-delay: 0.3s;
        }

        @keyframes bounce-emoji {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        /* Subtitle */
        .maintenance-subtitle {
            font-size: 16px;
            font-weight: 600;
            color: #4ade80;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        /* Description */
        .maintenance-desc {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 32px;
            font-weight: 400;
        }

        /* Contact button */
        .contact-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(30, 60, 60, 0.6);
            border: 1px solid rgba(45, 212, 191, 0.3);
            border-radius: 50px;
            padding: 14px 28px;
            color: #2dd4bf;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .contact-btn:hover {
            background: rgba(30, 80, 80, 0.8);
            border-color: rgba(45, 212, 191, 0.6);
            box-shadow: 0 0 25px rgba(45, 212, 191, 0.15);
            transform: translateY(-2px);
        }

        .contact-btn:active {
            transform: translateY(0);
        }

        .contact-label {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        .contact-icon {
            font-size: 18px;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: rgba(139, 92, 246, 0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: float-particle linear infinite;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .maintenance-card {
                padding: 36px 24px;
                border-radius: 20px;
            }

            .maintenance-title {
                font-size: 22px;
            }

            .gear-icon {
                font-size: 48px;
            }

            .contact-btn {
                padding: 12px 22px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>

    <!-- Floating particles -->
    <div id="particles"></div>

    <div class="maintenance-card">
        <div class="gear-container">
            <span class="gear-icon">⚙️</span>
            <span class="gear-wrench">🔧</span>
        </div>

        <h1 class="maintenance-title">
            <span class="construction-emoji">🚧</span>
            MAINTENANCE
            <span class="construction-emoji">🚧</span>
        </h1>

        <p class="maintenance-subtitle">Website sedang dalam perbaikan</p>
        <p class="maintenance-desc">Maaf, silakan coba lagi nanti</p>

        <a href="https://wa.me/6285724875555" class="contact-btn" target="_blank">
            <span class="contact-label">Hubungi:</span>
            <span class="contact-icon">📱</span>
            <span>085724875555</span>
        </a>
    </div>

    <script>
        // Create floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDuration = (Math.random() * 15 + 10) + 's';
            p.style.animationDelay = (Math.random() * 10) + 's';
            p.style.background = Math.random() > 0.5
                ? 'rgba(139, 92, 246, 0.4)'
                : 'rgba(236, 72, 153, 0.3)';
            container.appendChild(p);
        }
    </script>
</body>

</html>
